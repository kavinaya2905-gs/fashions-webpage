<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashionista Grand Opening</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Segoe UI; }

body { background:#111; color:#fff; }

/* HERO */
.hero {
    height:100vh;
    background:url('https://picsum.photos/1600/900?fashion') no-repeat center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1 {
    font-size:3.5rem;
    background:linear-gradient(45deg,#ff6a00,#ee0979);
    -webkit-background-clip:text;
    color:transparent;
}

.hero p { margin-top:10px; }

.btn {
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:#ff6a00;
    color:#fff;
    cursor:pointer;
}

/* IMAGE GRID */
.banner {
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
}

.banner img {
    width:100%;
    height:300px;
    object-fit:cover;
}

/* SECTION */
.section {
    padding:50px 20px;
    text-align:center;
}

/* PRODUCTS */
.products {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.product {
    background:#222;
    padding:15px;
    border-radius:10px;
    width:250px;
}

.product img {
    width:100%;
    height:200px;
    object-fit:cover;
}

/* FORM */
form {
    max-width:400px;
    margin:auto;
}

input, textarea {
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:5px;
}

/* MAP */
.map iframe {
    width:100%;
    height:300px;
    border:0;
}

footer {
    text-align:center;
    padding:15px;
    background:#000;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <div>
        <h1>FASHIONISTA</h1>
        <p>"Redefine Your Style"</p>
        <button class="btn" onclick="scrollDown()">Explore</button>
    </div>
</div>

<!-- IMAGE GRID (ALL VISIBLE) -->
<div class="banner">
    <img src="https://picsum.photos/600/400?fashion1">
    <img src="https://picsum.photos/600/400?fashion2">
    <img src="https://picsum.photos/600/400?fashion3">
    <img src="https://picsum.photos/600/400?fashion4">
</div>

<!-- PRODUCTS -->
<section class="section">
    <h2>Shop Highlights</h2>

    <div class="products">

        <div class="product">
            <img src="https://picsum.photos/400/300?dress">
            <h3>Elegant Summer Dress</h3>
        </div>

        <div class="product">
            <img src="https://picsum.photos/400/300?suit">
            <h3>Modern Street Style</h3>
        </div>

        <div class="product">
            <img src="https://picsum.photos/400/300?fashion">
            <h3>Luxury Designer Wear</h3>
        </div>

    </div>
</section>

<!-- MAP -->
<section class="section map">
    <h2>Visit Our Store</h2>
    <iframe src="https://maps.google.com/maps?q=Chennai&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
</section>

<!-- CONTACT -->
<section class="section">
    <h2>Contact Us</h2>
    <form onsubmit="submitForm(event)">
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea placeholder="Your Message"></textarea>
        <button class="btn">Send</button>
    </form>

    <p style="margin-top:20px;">📞 +91 98765 43210</p>
    <p>📧 fashionista@email.com</p>
</section>

<footer>
    © 2026 Fashionista ✨
</footer>

<script>
function scrollDown(){
    window.scrollBy({ top: window.innerHeight, behavior: 'smooth' });
}

function submitForm(e){
    e.preventDefault();
    alert("Thank you! We will contact you soon.");
}
</script>

</body>
</html>
